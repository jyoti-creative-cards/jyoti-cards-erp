databases: []

services:
  # ── 1. Streamlit ERP (internal dashboard) ─────────────────────────────────
  - type: web
    name: jyoti-cards-erp
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    healthCheckPath: /_stcore/health
    disk:
      name: jyoti-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DB_PATH
        value: /data/ops.db
      - key: APP_PASSWORD
        sync: false
      - key: BUSINESS_WHATSAPP_NUMBER
        value: "9516789702"
      - key: INTERNAL_ALERT_NUMBER
        value: "9754656565"
      - key: WHATSAPP_PROVIDER
        value: meta
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        value: "1052983514569869"
      - key: META_BUSINESS_ACCOUNT_ID
        value: "2163859664363077"
      - key: META_API_VERSION
        value: v25.0
      - key: BOT_BASE_URL
        value: https://jyoti-cards-bot.onrender.com

  # ── 2. WhatsApp Bot (webhook + order processing) ──────────────────────────
  - type: web
    name: jyoti-cards-bot
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python webhook_server.py
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: jyoti-db          # SAME disk — shared SQLite
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DB_PATH
        value: /data/ops.db
      - key: META_WEBHOOK_PATH
        value: /webhooks/whatsapp
      - key: META_WEBHOOK_VERIFY_TOKEN
        value: jyoti_cards_wh_verify_2026
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        value: "1052983514569869"
      - key: META_BUSINESS_ACCOUNT_ID
        value: "2163859664363077"
      - key: META_API_VERSION
        value: v25.0
      - key: BUSINESS_WHATSAPP_NUMBER
        value: "9516789702"
      - key: STOCK_SITE_URL
        value: https://jyoti-cards-stock.onrender.com
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        value: https://zeroque-intel.openai.azure.com/
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-06-01"
      - key: AZURE_OPENAI_LLM_DEPLOYMENT
        value: gpt-5-nano
