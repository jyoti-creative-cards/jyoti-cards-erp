name: Deploy Backend → Railway

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Sync backend → jyoti-erp-api → Railway auto-deploys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone jyoti-erp-api
        run: |
          git clone https://oauth2:${{ secrets.GH_PAT }}@github.com/jyoti-creative-cards/jyoti-erp-api.git /tmp/erp-api

      - name: Sync backend code
        run: |
          rsync -av --delete \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='dev.db' \
            --exclude='.git' \
            backend/ /tmp/erp-api/

      - name: Commit and push
        working-directory: /tmp/erp-api
        run: |
          git config user.email "ci@jyoti-erp.com"
          git config user.name "Jyoti ERP CI"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy: sync backend from jyoti-cards-erp@${{ github.sha }}"
          git push https://oauth2:${{ secrets.GH_PAT }}@github.com/jyoti-creative-cards/jyoti-erp-api.git main
